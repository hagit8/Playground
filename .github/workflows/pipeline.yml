name: Demo CI/CD Pipeline

on: [push, pull_request]

jobs:
  quality-check:
    name: Lint & Test Stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Linting Stub
        run: echo "Running linter... Done!"
      - name: Run Unit Tests Stub
        run: echo "Running tests... All 12 tests passed!"
        
  build-and-scan:
    name: Build and Security Scan
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 1. Build the image first so it exists locally on the runner
      - name: Build Docker Image
        run: docker build -t demo-app:${{ github.sha }} .

      # 2. Now tell Snyk to scan the image you just built
      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: demo-app:${{ github.sha }} # Tell Snyk exactly which image to scan
          args: --file=Dockerfile
